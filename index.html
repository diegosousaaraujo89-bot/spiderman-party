<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Festa do Arthur 🏎️</title>

  <!-- PWA -->
  <meta name="theme-color" content="#CC0000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Festa Arthur" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    body{background:#080808;font-family:'Nunito',sans-serif;color:#F2F2F2;}
    ::-webkit-scrollbar{width:0;height:0;}
    .hw-card{transition:transform .15s ease,box-shadow .15s ease;}
    .hw-card:active{transform:scale(0.985);}
    .hw-btn:active{transform:scale(0.93);opacity:0.85;}
    .hw-tab{transition:color .2s,border-color .2s;}
    .hw-check{transition:background .2s,border-color .2s;}
    .hw-fade{animation:fadeUp .3s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .hw-slide{animation:slideIn .3s cubic-bezier(.4,0,.2,1) both;}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
    .hw-spin{animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .hw-splash{animation:splashOut .6s ease 2.4s both;}
    @keyframes splashOut{to{opacity:0;pointer-events:none;}}
    .hw-car{animation:carRide 2s ease-in-out both;}
    @keyframes carRide{0%{transform:translateX(-120px) scaleX(-1);}70%{transform:translateX(0) scaleX(-1);}100%{transform:translateX(0) scaleX(-1);}}
    .hw-title-in{animation:titlePop .5s cubic-bezier(.34,1.56,.64,1) .7s both;}
    @keyframes titlePop{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
    .hw-progress{transition:width .5s cubic-bezier(.4,0,.2,1);}
    @keyframes dot{to{opacity:1;}}
    input[type=number]::-webkit-inner-spin-button{opacity:1;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* -- STORAGE (localStorage para PWA offline) -- */
    const SK = "hotwheels-festa-2027";
    function loadData() {
      try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : null; } catch { return null; }
    }
    function saveData(d) {
      try { localStorage.setItem(SK, JSON.stringify(d)); } catch(e) { console.error(e); }
    }

    const DD = {
      convidados: [
        { id:1, nome:"Vovó Maria", grupo:"Família", confirmado:null, adultos:1, criancas:0 },
        { id:2, nome:"Vovô João", grupo:"Família", confirmado:null, adultos:1, criancas:0 },
        { id:3, nome:"Tio Carlos + Tia Ana", grupo:"Família", confirmado:null, adultos:2, criancas:1 },
        { id:4, nome:"Tia Fernanda", grupo:"Família", confirmado:null, adultos:1, criancas:0 },
        { id:5, nome:"Primo Rafael", grupo:"Família", confirmado:null, adultos:0, criancas:1 },
        { id:6, nome:"Lucas (escola)", grupo:"Escola", confirmado:null, adultos:2, criancas:1 },
        { id:7, nome:"Pedro (escola)", grupo:"Escola", confirmado:null, adultos:2, criancas:1 },
        { id:8, nome:"Enzo (escola)", grupo:"Escola", confirmado:null, adultos:2, criancas:1 },
        { id:9, nome:"Davi (escola)", grupo:"Escola", confirmado:null, adultos:2, criancas:1 },
        { id:10, nome:"Matheus (escola)", grupo:"Escola", confirmado:null, adultos:2, criancas:1 },
        { id:11, nome:"Família Souza", grupo:"Amigos", confirmado:null, adultos:2, criancas:2 },
        { id:12, nome:"Família Oliveira", grupo:"Amigos", confirmado:null, adultos:2, criancas:1 },
        { id:13, nome:"Família Santos", grupo:"Amigos", confirmado:null, adultos:2, criancas:0 },
        { id:14, nome:"Família Costa", grupo:"Amigos", confirmado:null, adultos:2, criancas:2 },
        { id:15, nome:"Família Lima", grupo:"Amigos", confirmado:null, adultos:2, criancas:1 },
      ],
      checklist: [
        { id:1, item:"Fechar buffet", categoria:"Buffet", done:false },
        { id:2, item:"Confirmar cardápio", categoria:"Buffet", done:false },
        { id:3, item:"Pagar entrada do buffet", categoria:"Buffet", done:false },
        { id:4, item:"Contratar DJ/som", categoria:"Entretenimento", done:false },
        { id:5, item:"Encomendar bolo", categoria:"Alimentação", done:false },
        { id:6, item:"Encomendar docinhos", categoria:"Alimentação", done:false },
        { id:7, item:"Comprar balões Hot Wheels", categoria:"Decoração", done:false },
        { id:8, item:"Encomendar painel decorativo", categoria:"Decoração", done:false },
        { id:9, item:"Comprar caixinhas de lembrança", categoria:"Lembranças", done:false },
        { id:10, item:"Imprimir convites", categoria:"Convites", done:false },
        { id:11, item:"Enviar convites", categoria:"Convites", done:false },
        { id:12, item:"Contratar fotógrafo", categoria:"Registro", done:false },
        { id:13, item:"Comprar roupa do aniversariante", categoria:"Aniversariante", done:false },
        { id:14, item:"Confirmar lista final com buffet", categoria:"Buffet", done:false },
        { id:15, item:"Preparar playlist de músicas", categoria:"Entretenimento", done:false },
      ],
      orcamento: [
        { id:1, item:"Buffet (100 pessoas)", valor:8000, pago:false },
        { id:2, item:"Bolo personalizado", valor:600, pago:false },
        { id:3, item:"Docinhos (200 un)", valor:300, pago:false },
        { id:4, item:"Decoração temática", valor:800, pago:false },
        { id:5, item:"DJ / Animação", valor:700, pago:false },
        { id:6, item:"Fotógrafo", valor:900, pago:false },
        { id:7, item:"Convites", valor:150, pago:false },
        { id:8, item:"Lembranças", valor:400, pago:false },
        { id:9, item:"Roupa do aniversariante", valor:200, pago:false },
        { id:10, item:"Imprevistos (10%)", valor:1205, pago:false },
      ],
    };

    const C = {
      red:"#D00000",redD:"#8B0000",yellow:"#FFD700",black:"#080808",dark:"#101010",
      surface:"#181818",card:"#1F1F1F",card2:"#272727",text:"#F2F2F2",muted:"#666",
      success:"#22C55E",danger:"#EF4444",blue:"#3B82F6",purple:"#8B5CF6",border:"#2C2C2C",
    };

    function EditField({ value, onSave, type="text", style={} }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(value);
      const ref = useRef();
      useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);
      const commit = () => { onSave(type==="number"?parseFloat(val)||0:val); setEditing(false); };
      if (editing) return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}>
          <input ref={ref} type={type} value={val}
            onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter")commit(); if(e.key==="Escape")setEditing(false); }}
            style={{ background:C.card2, border:`1.5px solid ${C.yellow}`, borderRadius:6, padding:"4px 8px", color:C.text, fontFamily:"'Nunito',sans-serif", fontSize:13, outline:"none", width:type==="number"?64:160 }}
          />
          <button onClick={commit} style={{ background:C.success+"22",color:C.success,border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",fontSize:13 }}>✓</button>
          <button onClick={()=>setEditing(false)} style={{ background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13 }}>✕</button>
        </span>
      );
      return (
        <span onClick={()=>{ setVal(value); setEditing(true); }}
          style={{ display:"inline-flex", alignItems:"center", gap:5, cursor:"text", ...style }}>
          {value}<span style={{ fontSize:10, opacity:.35 }}>✏️</span>
        </span>
      );
    }

    function Splash({ onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2900); return ()=>clearTimeout(t); }, []);
      return (
        <div className="hw-splash" style={{ position:"fixed", inset:0, zIndex:999, background:`linear-gradient(170deg,${C.redD},${C.red} 55%,#1a0000)`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
          <div style={{ height:6, background:`repeating-linear-gradient(90deg,${C.yellow} 0,${C.yellow} 20px,transparent 20px,transparent 40px)`, width:"100%", position:"absolute", top:0 }} />
          <div style={{ height:6, background:`repeating-linear-gradient(90deg,${C.yellow} 0,${C.yellow} 20px,transparent 20px,transparent 40px)`, width:"100%", position:"absolute", bottom:0 }} />
          <div className="hw-car" style={{ fontSize:72, marginBottom:8 }}>🏎️</div>
          <div className="hw-title-in" style={{ fontFamily:"'Bebas Neue',cursive", fontSize:52, color:"#fff", letterSpacing:3, lineHeight:1, textShadow:`3px 3px 0 ${C.redD}` }}>HOT WHEELS</div>
          <div className="hw-title-in" style={{ fontFamily:"'Bebas Neue',cursive", fontSize:22, color:C.yellow, letterSpacing:6, animationDelay:".85s" }}>PARTY PLANNER</div>
          <div className="hw-title-in" style={{ marginTop:16, fontSize:13, color:"rgba(255,255,255,.5)", fontWeight:700, animationDelay:"1.1s" }}>Festa do Arthur  09/01/2027</div>
        </div>
      );
    }

    const TABS = [
      { id:"home", icon:"🏠", label:"Início" },
      { id:"guests", icon:"👥", label:"Convidados" },
      { id:"check", icon:"✅", label:"Tarefas" },
      { id:"budget", icon:"💰", label:"Gastos" },
    ];

    function BottomNav({ tab, setTab }) {
      return (
        <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:C.surface, borderTop:`1px solid ${C.border}`, display:"flex", zIndex:100, paddingBottom:"env(safe-area-inset-bottom,0px)", boxShadow:`0 -8px 32px rgba(0,0,0,.7)` }}>
          {TABS.map(t => {
            const active = tab===t.id;
            return (
              <button key={t.id} className="hw-tab" onClick={()=>setTab(t.id)}
                style={{ flex:1, background:"none", border:"none", padding:"10px 4px 8px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, color:active?C.yellow:C.muted, fontFamily:"'Nunito',sans-serif", fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, borderTop:active?`2px solid ${C.yellow}`:"2px solid transparent", marginTop:-1 }}>
                <span style={{ fontSize:22, filter:active?`drop-shadow(0 0 6px rgba(255,215,0,.6))`:"none", transition:"filter .2s" }}>{t.icon}</span>
                {t.label}
              </button>
            );
          })}
        </div>
      );
    }

    function StatCard({ icon, value, label, color }) {
      return (
        <div className="hw-card" style={{ background:C.card, borderRadius:14, padding:"14px 12px", borderBottom:`3px solid ${color}`, boxShadow:`0 4px 20px rgba(0,0,0,.4),0 0 0 1px ${C.border}` }}>
          <div style={{ fontSize:24 }}>{icon}</div>
          <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:32, color, lineHeight:1.1 }}>{value}</div>
          <div style={{ fontSize:10, color:C.muted, fontWeight:700, marginTop:2 }}>{label}</div>
        </div>
      );
    }

    function App() {
      const [splash, setSplash] = useState(true);
      const [tab, setTab] = useState("home");
      const [data, setData] = useState(() => loadData() || DD);
      const [addGuest, setAddGuest] = useState(false);
      const [newGuest, setNewGuest] = useState({ nome:"", grupo:"Família", adultos:2, criancas:1 });
      const [filterGroup, setFilterGroup] = useState("Todos");
      const [searchQ, setSearchQ] = useState("");

      const persist = useCallback((nd) => { setData(nd); saveData(nd); }, []);

      const conf = data.convidados.filter(g=>g.confirmado===true);
      const pend = data.convidados.filter(g=>g.confirmado===null);
      const recus = data.convidados.filter(g=>g.confirmado===false);
      const totalPessoas = conf.reduce((a,g)=>a+g.adultos+g.criancas,0);
      const checkDone = data.checklist.filter(c=>c.done).length;
      const totalOrc = data.orcamento.reduce((a,o)=>a+o.valor,0);
      const pago = data.orcamento.filter(o=>o.pago).reduce((a,o)=>a+o.valor,0);
      const falta = totalOrc - pago;
      const checkPct = Math.round((checkDone/data.checklist.length)*100);
      const pagoPct = totalOrc>0?Math.round((pago/totalOrc)*100):0;

      const toggleCheck = id => persist({...data, checklist:data.checklist.map(c=>c.id===id?{...c,done:!c.done}:c)});
      const toggleConfirm = (id,val) => persist({...data, convidados:data.convidados.map(g=>g.id===id?{...g,confirmado:g.confirmado===val?null:val}:g)});
      const togglePago = id => persist({...data, orcamento:data.orcamento.map(o=>o.id===id?{...o,pago:!o.pago}:o)});
      const removeGuest = id => persist({...data, convidados:data.convidados.filter(g=>g.id!==id)});
      const editGuest = (id,f,v) => persist({...data, convidados:data.convidados.map(g=>g.id===id?{...g,[f]:v}:g)});
      const editCheck = (id,v) => persist({...data, checklist:data.checklist.map(c=>c.id===id?{...c,item:v}:c)});
      const editOrc = (id,f,v) => persist({...data, orcamento:data.orcamento.map(o=>o.id===id?{...o,[f]:v}:o)});
      const addGuestFn = () => {
        if (!newGuest.nome.trim()) return;
        persist({...data, convidados:[...data.convidados,{...newGuest,id:Date.now(),confirmado:null,adultos:+newGuest.adultos,criancas:+newGuest.criancas}]});
        setNewGuest({nome:"",grupo:"Família",adultos:2,criancas:1}); setAddGuest(false);
      };

      const groups = ["Todos","Família","Escola","Amigos"];
      const filtered = data.convidados.filter(g=>(filterGroup==="Todos"||g.grupo===filterGroup)&&g.nome.toLowerCase().includes(searchQ.toLowerCase()));
      const cats = ["Buffet","Alimentação","Decoração","Convites","Entretenimento","Lembranças","Registro","Aniversariante"];
      const gc = g=>g==="Família"?C.red:g==="Escola"?C.blue:C.purple;

      const cardSt = { background:C.card, borderRadius:16, padding:16, marginBottom:12, boxShadow:`0 4px 24px rgba(0,0,0,.5),0 0 0 1px ${C.border}` };
      const inpSt = { background:C.card2, border:`1px solid ${C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontFamily:"'Nunito',sans-serif", fontSize:14, outline:"none", width:"100%" };
      const btnP = { background:`linear-gradient(135deg,${C.red},${C.redD})`, color:"#fff", border:"none", borderRadius:12, padding:14, fontFamily:"'Nunito',sans-serif", fontWeight:900, fontSize:15, cursor:"pointer", width:"100%", marginTop:8, boxShadow:`0 4px 16px rgba(200,0,0,.4)` };
      const btnSm = (color=C.red) => ({ background:color+"18", color, border:`1px solid ${color}33`, borderRadius:9, padding:"5px 11px", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"'Nunito',sans-serif" });

      return (
        <div style={{ background:C.black, minHeight:"100vh", maxWidth:480, margin:"0 auto", position:"relative" }}>
          {splash && <Splash onDone={()=>setSplash(false)} />}

          {/* HEADER */}
          <div style={{ background:C.surface, padding:"12px 16px 0", borderBottom:`1px solid ${C.border}`, position:"sticky", top:0, zIndex:50 }}>
            <div style={{ height:4, background:`repeating-linear-gradient(90deg,${C.yellow} 0,${C.yellow} 16px,transparent 16px,transparent 30px)`, marginBottom:10, borderRadius:2 }} />
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ fontFamily:"'Bebas Neue',cursive", fontSize:10, letterSpacing:3, color:C.yellow, opacity:.8 }}>🏁 HOT WHEELS PARTY</span>
              <span style={{ background:C.yellow, color:C.black, fontWeight:900, fontSize:10, padding:"3px 10px", borderRadius:20 }}>09/01/2027</span>
            </div>
            <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:28, lineHeight:1, color:"#fff", textShadow:`2px 2px 0 ${C.redD}`, letterSpacing:1, marginTop:2 }}>FESTA DO ARTHUR</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,.5)", fontWeight:700, marginBottom:10 }}>Arthur Mosca · 6 Anos · 100 Pessoas 🎉</div>
          </div>

          {/* PAGE */}
          <div key={tab} className="hw-slide" style={{ padding:16, paddingBottom:90 }}>

            {tab==="home" && (
              <div>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:18, letterSpacing:2, color:C.yellow, marginBottom:12 }}>📊 Resumo</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
                  <StatCard icon="✅" value={conf.length} label="Confirmados" color={C.success} />
                  <StatCard icon="⏳" value={pend.length} label="Aguardando" color={C.yellow} />
                  <StatCard icon="👥" value={totalPessoas} label="Pessoas conf." color={C.red} />
                  <StatCard icon="❌" value={recus.length} label="Recusaram" color={C.danger} />
                </div>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:18, letterSpacing:2, color:C.yellow, marginBottom:12 }}>📈 Progresso</div>
                {[
                  { label:"Tarefas concluídas", pct:checkPct, sub:`${checkDone} de ${data.checklist.length}`, color:C.success },
                  { label:"Orçamento pago", pct:pagoPct, sub:`R$ ${pago.toLocaleString("pt-BR")} de R$ ${totalOrc.toLocaleString("pt-BR")}`, color:C.yellow },
                ].map((p,i)=>(
                  <div key={i} className="hw-card" style={cardSt}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                      <span style={{ fontWeight:700, fontSize:13 }}>{p.label}</span>
                      <span style={{ color:p.color, fontWeight:900 }}>{p.pct}%</span>
                    </div>
                    <div style={{ background:C.card2, borderRadius:8, height:9, overflow:"hidden" }}>
                      <div className="hw-progress" style={{ height:"100%", width:`${p.pct}%`, background:p.color, borderRadius:8 }} />
                    </div>
                    <div style={{ fontSize:11, color:C.muted, marginTop:6 }}>{p.sub}</div>
                  </div>
                ))}
                <div className="hw-card" style={{ ...cardSt, background:`linear-gradient(135deg,${C.redD},#1a0000)`, border:`1px solid ${C.red}44` }}>
                  <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:12, letterSpacing:2, color:C.yellow, marginBottom:4 }}>ORÇAMENTO TOTAL</div>
                  <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:40, color:C.yellow, lineHeight:1 }}>R$ {totalOrc.toLocaleString("pt-BR")}</div>
                  <div style={{ display:"flex", gap:20, marginTop:6 }}>
                    <div><span style={{ color:C.success, fontWeight:900 }}>R$ {pago.toLocaleString("pt-BR")}</span> <span style={{ color:C.muted, fontSize:11 }}>pago</span></div>
                    <div><span style={{ color:C.danger, fontWeight:900 }}>R$ {falta.toLocaleString("pt-BR")}</span> <span style={{ color:C.muted, fontSize:11 }}>falta</span></div>
                  </div>
                </div>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:18, letterSpacing:2, color:C.yellow, marginBottom:12 }}>⚡ Ações Rápidas</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  {[
                    { label:"Convidados", icon:"👥", t:"guests", color:C.blue },
                    { label:"Tarefas", icon:"✅", t:"check", color:C.success },
                    { label:"Gastos", icon:"💰", t:"budget", color:C.yellow },
                    { label:"+ Convidado", icon:"➕", t:"guests", color:C.red, extra:()=>setTimeout(()=>setAddGuest(true),300) },
                  ].map((a,i)=>(
                    <button key={i} className="hw-btn hw-card" onClick={()=>{ setTab(a.t); a.extra&&a.extra(); }}
                      style={{ ...cardSt, background:a.color+"18", border:`1px solid ${a.color}33`, cursor:"pointer", borderRadius:14, display:"flex", flexDirection:"column", alignItems:"flex-start", gap:6, padding:14, marginBottom:0 }}>
                      <span style={{ fontSize:24 }}>{a.icon}</span>
                      <span style={{ color:a.color, fontWeight:700, fontSize:12 }}>{a.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {tab==="guests" && (
              <div>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:18, letterSpacing:2, color:C.yellow, marginBottom:12 }}>👥 Convidados ({data.convidados.length})</div>
                <input style={{ ...inpSt, marginBottom:10 }} placeholder="🔍 Buscar..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} />
                <div style={{ display:"flex", gap:6, marginBottom:14, overflowX:"auto", paddingBottom:4 }}>
                  {groups.map(g=><button key={g} className="hw-btn" onClick={()=>setFilterGroup(g)} style={{ ...btnSm(filterGroup===g?C.yellow:C.muted), whiteSpace:"nowrap", flexShrink:0, padding:"6px 14px" }}>{g}</button>)}
                </div>
                <div style={cardSt}>
                  {filtered.length===0 && <div style={{ textAlign:"center", color:C.muted, padding:24 }}>Nenhum encontrado</div>}
                  {filtered.map((g,i)=>(
                    <div key={g.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 0", borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none" }}>
                      <div style={{ width:38, height:38, borderRadius:12, background:gc(g.grupo)+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>
                        {g.grupo==="Família"?"👨‍👩‍👧‍👦":g.grupo==="Escola"?"🎒":"🤝"}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <EditField value={g.nome} onSave={v=>editGuest(g.id,"nome",v)} style={{ fontWeight:700, fontSize:14 }} />
                        <div style={{ display:"flex", gap:5, marginTop:3, alignItems:"center", flexWrap:"wrap" }}>
                          <span style={{ background:gc(g.grupo)+"22", color:gc(g.grupo), borderRadius:20, padding:"2px 9px", fontSize:10, fontWeight:700 }}>{g.grupo}</span>
                          <span style={{ color:C.muted, fontSize:10 }}>
                            👤 <EditField value={g.adultos} type="number" onSave={v=>editGuest(g.id,"adultos",v)} style={{ color:C.muted, fontSize:10 }} />
                            {" "}👶 <EditField value={g.criancas} type="number" onSave={v=>editGuest(g.id,"criancas",v)} style={{ color:C.muted, fontSize:10 }} />
                          </span>
                        </div>
                      </div>
                      <div style={{ display:"flex", gap:4, flexShrink:0 }}>
                        <button className="hw-btn" onClick={()=>toggleConfirm(g.id,true)} style={{ ...btnSm(g.confirmado===true?C.success:C.muted), padding:"5px 8px" }}>✓</button>
                        <button className="hw-btn" onClick={()=>toggleConfirm(g.id,false)} style={{ ...btnSm(g.confirmado===false?C.danger:C.muted), padding:"5px 8px" }}>✗</button>
                        <button className="hw-btn" onClick={()=>removeGuest(g.id)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:15 }}>🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
                {!addGuest
                  ? <button className="hw-btn" style={btnP} onClick={()=>setAddGuest(true)}>+ Adicionar Convidado</button>
                  : (
                    <div className="hw-fade" style={{ ...cardSt, borderLeft:`4px solid ${C.yellow}` }}>
                      <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:16, color:C.yellow, marginBottom:12, letterSpacing:1 }}>NOVO CONVIDADO</div>
                      <input style={{ ...inpSt, marginBottom:8 }} placeholder="Nome" value={newGuest.nome} onChange={e=>setNewGuest({...newGuest,nome:e.target.value})} />
                      <select style={{ ...inpSt, marginBottom:8 }} value={newGuest.grupo} onChange={e=>setNewGuest({...newGuest,grupo:e.target.value})}>
                        <option>Família</option><option>Escola</option><option>Amigos</option>
                      </select>
                      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
                        {["adultos","criancas"].map(f=>(
                          <div key={f} style={{ flex:1 }}>
                            <div style={{ fontSize:9, color:C.muted, textTransform:"uppercase", letterSpacing:1, fontWeight:700, marginBottom:4 }}>{f==="adultos"?"Adultos":"Crianças"}</div>
                            <input type="number" min="0" max="20" style={inpSt} value={newGuest[f]} onChange={e=>setNewGuest({...newGuest,[f]:e.target.value})} />
                          </div>
                        ))}
                      </div>
                      <div style={{ display:"flex", gap:8 }}>
                        <button className="hw-btn" style={{ ...btnP, marginTop:0 }} onClick={addGuestFn}>Salvar</button>
                        <button className="hw-btn" style={{ ...btnP, marginTop:0, background:C.card2, boxShadow:"none" }} onClick={()=>setAddGuest(false)}>Cancelar</button>
                      </div>
                    </div>
                  )
                }
              </div>
            )}

            {tab==="check" && (
              <div>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:18, letterSpacing:2, color:C.yellow, marginBottom:12 }}>✅ Tarefas</div>
                <div className="hw-card" style={{ ...cardSt, marginBottom:16 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <span style={{ fontWeight:700 }}>Progresso</span>
                    <span style={{ color:C.success, fontWeight:900, fontFamily:"'Bebas Neue',cursive", fontSize:20 }}>{checkDone}/{data.checklist.length}</span>
                  </div>
                  <div style={{ background:C.card2, borderRadius:8, height:10, overflow:"hidden" }}>
                    <div className="hw-progress" style={{ height:"100%", width:`${checkPct}%`, background:`linear-gradient(90deg,${C.success},#4ADE80)`, borderRadius:8 }} />
                  </div>
                  <div style={{ fontSize:11, color:C.muted, marginTop:6 }}>{checkPct}% concluído</div>
                </div>
                {cats.map(cat=>{
                  const items = data.checklist.filter(c=>c.categoria===cat);
                  if (!items.length) return null;
                  const cd = items.filter(c=>c.done).length;
                  return (
                    <div key={cat} style={{ marginBottom:4 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                        <span style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, fontWeight:700 }}>{cat}</span>
                        <span style={{ fontSize:10, color:cd===items.length?C.success:C.muted, fontWeight:700 }}>{cd}/{items.length}</span>
                      </div>
                      <div style={cardSt}>
                        {items.map((c,i)=>(
                          <div key={c.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"11px 0", borderBottom:i<items.length-1?`1px solid ${C.border}`:"none", cursor:"pointer" }} onClick={()=>toggleCheck(c.id)}>
                            <div className="hw-check" style={{ width:24, height:24, borderRadius:7, border:`2px solid ${c.done?C.success:C.border}`, background:c.done?C.success:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:14, boxShadow:c.done?`0 0 10px ${C.success}55`:"none" }}>
                              {c.done&&"✓"}
                            </div>
                            <EditField value={c.item} onSave={v=>editCheck(c.id,v)}
                              style={{ fontSize:14, fontWeight:600, opacity:c.done?.4:1, textDecoration:c.done?"line-through":"none" }} />
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {tab==="budget" && (
              <div>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:18, letterSpacing:2, color:C.yellow, marginBottom:12 }}>💰 Orçamento</div>
                <div className="hw-card" style={{ ...cardSt, background:`linear-gradient(135deg,${C.redD},#1a0000)`, border:`1px solid ${C.red}44`, marginBottom:16 }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <div>
                      <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:1, fontWeight:700 }}>Total estimado</div>
                      <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:32, color:C.yellow, lineHeight:1 }}>R$ {totalOrc.toLocaleString("pt-BR")}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:1, fontWeight:700 }}>Falta pagar</div>
                      <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:32, color:C.danger, lineHeight:1 }}>R$ {falta.toLocaleString("pt-BR")}</div>
                    </div>
                  </div>
                  <div style={{ background:"rgba(0,0,0,.4)", borderRadius:8, height:10, overflow:"hidden", margin:"12px 0 6px" }}>
                    <div className="hw-progress" style={{ height:"100%", width:`${pagoPct}%`, background:`linear-gradient(90deg,${C.success},#4ADE80)`, borderRadius:8 }} />
                  </div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,.4)" }}>R$ {pago.toLocaleString("pt-BR")} pago ({pagoPct}%)</div>
                </div>
                <div style={cardSt}>
                  {data.orcamento.map((o,i)=>(
                    <div key={o.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 0", borderBottom:i<data.orcamento.length-1?`1px solid ${C.border}`:"none" }}>
                      <div style={{ width:36, height:36, borderRadius:10, background:o.pago?C.success+"22":C.yellow+"18", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>
                        {o.pago?"✅":"💵"}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <EditField value={o.item} onSave={v=>editOrc(o.id,"item",v)} style={{ fontWeight:700, fontSize:13, opacity:o.pago?.5:1 }} />
                        <div style={{ display:"flex", alignItems:"center", gap:3, marginTop:2 }}>
                          <span style={{ color:C.muted, fontSize:11 }}>R$</span>
                          <EditField value={o.valor} type="number" onSave={v=>editOrc(o.id,"valor",v)}
                            style={{ fontFamily:"'Bebas Neue',cursive", fontSize:20, color:o.pago?C.success:C.yellow, lineHeight:1 }} />
                        </div>
                      </div>
                      <button className="hw-btn" onClick={()=>togglePago(o.id)} style={btnSm(o.pago?C.success:C.muted)}>
                        {o.pago?"Pago ✅":"Pagar"}
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          <BottomNav tab={tab} setTab={setTab} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Service Worker para PWA offline
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
