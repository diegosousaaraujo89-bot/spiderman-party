<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Spider Party</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{font-family:sans-serif;background:#020617;color:#fff;padding:20px}
.card{background:#111827;padding:10px;margin-bottom:10px;border-radius:8px}
button{margin-right:5px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect}=React;

function App(){
const [list,setList]=useState([]);

async function load(){
 const r=await fetch("/api/convidados");
 const d=await r.json();
 setList(d);
}

useEffect(()=>{load()},[]);

const confirm=(id,val)=>{
 fetch("/api/confirmar",{method:"POST",body:JSON.stringify({id,val})})
 .then(load);
};

return(
<div>
<h1>🕷️ Spider Party</h1>
{list.map(g=>(
<div key={g.id} className="card">
{g.nome}
<br/>
<button onClick={()=>confirm(g.id,true)}>✔</button>
<button onClick={()=>confirm(g.id,false)}>✖</button>
</div>
))}
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
