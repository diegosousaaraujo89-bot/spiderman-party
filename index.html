  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    body{background:#0b1120;font-family:'Nunito',sans-serif;color:#F2F2F2;}
    ::-webkit-scrollbar{width:0;height:0;}
    .hw-card{transition:transform .15s ease,box-shadow .15s ease;}
    .hw-card:active{transform:scale(0.985);}
    .hw-btn:active{transform:scale(0.93);opacity:0.85;}
    .hw-tab{transition:color .2s,border-color .2s;}
    .hw-check{transition:background .2s,border-color .2s;}
    .hw-fade{animation:fadeUp .3s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .hw-slide{animation:slideIn .3s cubic-bezier(.4,0,.2,1) both;}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
    .hw-spin{animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .hw-splash{animation:splashOut .6s ease 2.4s both;}
    @keyframes splashOut{to{opacity:0;pointer-events:none;}}
    .hw-car{animation:carRide 2s ease-in-out both;}
    @keyframes carRide{0%{transform:translateX(-250px) scaleX(1);opacity:0;}65%{transform:translateX(8px) scaleX(1);opacity:1;}80%{transform:translateX(-4px);}100%{transform:translateX(0);opacity:1;}}
    .hw-title-in{animation:titlePop .5s cubic-bezier(.34,1.56,.64,1) .7s both;}
    @keyframes titlePop{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
    .hw-progress{transition:width .5s cubic-bezier(.4,0,.2,1);}
    @keyframes dot{to{opacity:1;}}
    input[type=number]::-webkit-inner-spin-button{opacity:1;}
    .hw-splash .hw-car{font-size:0!important;line-height:0;}

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* -- API (servidor Render) -- */
    const API = window.location.origin;

    async function apiGet(path) {
      try { const r = await fetch(API+path); return r.ok ? r.json() : null; } catch { return null; }
    }
    async function apiPost(path, body) {
      try { const r = await fetch(API+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); return r.ok ? r.json() : null; } catch { return null; }
    }
    async function apiPut(path, body) {
      try { const r = await fetch(API+path,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); return r.ok ? r.json() : null; } catch { return null; }

    function EditField({ value, onSave, type="text", style={} }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(value);
      const ref = useRef();
      useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);
      const commit = () => { onSave(type==="number"?parseFloat(val)||0:val); setEditing(false); };
      if (editing) return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}>
          <input ref={ref} type={type} value={val}
            onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter")commit(); if(e.key==="Escape")setEditing(false); }}
            style={{ background:C.card2, border:`1.5px solid ${C.yellow}`, borderRadius:6, padding:"4px 8px", color:C.text, fontFamily:"'Nunito',sans-serif", fontSize:13, outline:"none", width:type==="number"?64:160 }}
          />
          <button onClick={commit} style={{ background:C.success+"22",color:C.success,border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",fontSize:13 }}>✓</button>
          <button onClick={()=>setEditing(false)} style={{ background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13 }}>✕</button>
        </span>
      );
      return (
        <span onClick={()=>{ setVal(value); setEditing(true); }}
          style={{ display:"inline-flex", alignItems:"center", gap:5, cursor:"text", ...style }}>
          {value}<span style={{ fontSize:10, opacity:.35 }}>✏️</span>
        </span>
      );
    }

          const melhor = servico.opcoes[0]; // already sorted, index 0 = cheapest

                    <button className="hw-btn" onClick={()=>setNumPessoas(n=>n+10)} style={{ ...btnSm(C.yellow), padding:"8px 18px", fontSize:20, fontWeight:900 }}>+</button>
                  </div>
                  <div style={{ display:"flex", gap:6, marginTop:12 }}>
                    {[50,75,100,150,200].map(n=>(
                      <button key={n} className="hw-btn" onClick={()=>setNumPessoas(n)} style={{ ...btnSm(numPessoas===n?C.yellow:C.muted), flex:1, padding:"6px 2px", textAlign:"center", fontSize:11 }}>{n}</button>
                    ))}
                  </div>
                </div>

                {[
                  { nome:"Água", icon:"💧", color:"#60A5FA", itens:[
                    { desc:"Garrafas 500ml", qtd:Math.ceil(numPessoas*1.5), unidade:"garrafas", obs:"1,5 un/pessoa" },
                    { desc:"Galão 20L", qtd:Math.ceil(numPessoas*0.5/20), unidade:"galões", obs:"alternativa" },
                  ]},
                  { nome:"Coca-Cola", icon:"🥤", color:"#EF4444", itens:[
                    { desc:"Garrafas 2L", qtd:Math.ceil(numPessoas*0.3/2), unidade:"garrafas", obs:"300ml/pessoa" },
                    { desc:"Latas 350ml", qtd:Math.ceil(numPessoas*0.3/0.35), unidade:"latas", obs:"alternativa" },
                  ]},
                  { nome:"Guaraná", icon:"🟢", color:"#22C55E", itens:[
                    { desc:"Garrafas 2L", qtd:Math.ceil(numPessoas*0.3/2), unidade:"garrafas", obs:"300ml/pessoa" },
                    { desc:"Latas 350ml", qtd:Math.ceil(numPessoas*0.3/0.35), unidade:"latas", obs:"alternativa" },
                  ]},
                  { nome:"Fanta", icon:"🟠", color:"#F97316", itens:[
                    { desc:"Garrafas 2L", qtd:Math.ceil(numPessoas*0.25/2), unidade:"garrafas", obs:"250ml/pessoa" },
                    { desc:"Latas 350ml", qtd:Math.ceil(numPessoas*0.25/0.35), unidade:"latas", obs:"alternativa" },
                  ]},
                  { nome:"Suco de Laranja", icon:"🍊", color:"#FB923C", itens:[
                    { desc:"Caixinhas 1L", qtd:Math.ceil(numPessoas*0.25), unidade:"caixinhas", obs:"250ml/pessoa" },
                    { desc:"Pó (pacote 2L)", qtd:Math.ceil(numPessoas*0.25/2), unidade:"pacotes", obs:"cada faz 2L" },
                  ]},
                  { nome:"Chopp", icon:"🍺", color:"#FCD34D", itens:[
                    { desc:"Total em litros", qtd:Math.ceil(numPessoas*0.6), unidade:"litros", obs:"600ml/pessoa" },
                    { desc:"Barril 30L", qtd:Math.ceil(numPessoas*0.6/30), unidade:"barris", obs:"30L cada" },
                    { desc:"Barril 50L", qtd:Math.ceil(numPessoas*0.6/50), unidade:"barris", obs:"50L cada" },
                  ]},
                ].map(b=>(
                  <div key={b.nome} className="hw-card" style={{ ...cardSt, marginBottom:12, borderLeft:`4px solid ${b.color}` }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                      <div style={{ width:38, height:38, borderRadius:12, background:b.color+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{b.icon}</div>
                      <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:16, letterSpacing:1, color:b.color }}>{b.nome.toUpperCase()}</div>
                    </div>
                    {b.itens.map((it,i)=>(
                      <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 0", borderTop:`1px solid ${C.border}` }}>
                        <div>
                          <div style={{ fontWeight:700, fontSize:13 }}>{it.desc}</div>
                          <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{it.obs}</div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:34, color:b.color, lineHeight:1 }}>{it.qtd}</div>
                          <div style={{ fontSize:10, color:C.muted, fontWeight:700 }}>{it.unidade}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                ))}

                <div className="hw-card" style={{ ...cardSt }}>
                  <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:13, letterSpacing:2, color:C.yellow, marginBottom:8 }}>💡 DICAS</div>
                  {["Compre 10–15% a mais para não faltar","Gelo: 1kg por pessoa","Chopp: barril 30L = ~83 canecas de 350ml","Deixe água sempre gelada e acessível","Suco: caixinhas prontas facilitam o serviço"].map((d,i,arr)=>(
                    <div key={i} style={{ fontSize:12, color:C.muted, padding:"6px 0", borderBottom:i<arr.length-1?`1px solid ${C.border}`:"none", display:"flex", gap:8 }}>
                      <span style={{ color:C.yellow }}>•</span>{d}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          <BottomNav tab={tab} setTab={setTab} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Service Worker para PWA offline
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
