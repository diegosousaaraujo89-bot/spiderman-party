<!-- CÓDIGO COMPLETO AJUSTADO -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arthur ???</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{margin:0;background:#020617;color:#fff;font-family:'Nunito'}
.card{background:#111827;padding:14px;border-radius:12px;margin-bottom:10px}
.btn{padding:8px 10px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
.best{background:#22C55E33;border:1px solid #22C55E}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect}=React;

const C={
red:"#E11D48",redD:"#7F1D1D",yellow:"#FACC15",
black:"#020617",card:"#111827",text:"#F1F5F9"
};

function getBest(opcoes){
return opcoes.reduce((min,c)=>c.valor<min.valor?c:min,opcoes[0]);
}

function App(){

const [tab,setTab]=useState("home");

const [convidados,setConvidados]=useState([
{id:1,nome:"Vovó Maria",telefone:"11999999999",confirmado:null}
]);

const [cotacoes,setCotacoes]=useState([
{
id:1,
produto:"Buffet",
opcoes:[
{nome:"Fornecedor A",valor:8000},
{nome:"Fornecedor B",valor:7200},
{nome:"Fornecedor C",valor:8500},
{nome:"Fornecedor D",valor:7800}
]
}
]);

const addGuest=()=>{
setConvidados([...convidados,{id:Date.now(),nome:"",telefone:"",confirmado:null}]);
};

const updateGuest=(id,field,value)=>{
setConvidados(convidados.map(c=>c.id===id?{...c,[field]:value}:c));
};

const addCotacao=()=>{
setCotacoes([...cotacoes,{
id:Date.now(),
produto:"Novo Serviço",
opcoes:[
{nome:"Opçăo 1",valor:0},
{nome:"Opçăo 2",valor:0},
{nome:"Opçăo 3",valor:0},
{nome:"Opçăo 4",valor:0}
]
}]);
};

const updateCotacao=(id,i,field,value)=>{
setCotacoes(cotacoes.map(c=>{
if(c.id!==id) return c;
const nova=[...c.opcoes];
nova[i][field]=field==="valor"?Number(value):value;
return {...c,opcoes:nova};
}));
};

return(
<div style={{padding:20,maxWidth:500,margin:"auto"}}>

<h1 style={{fontFamily:"Bebas Neue",color:"#E11D48"}}>
??? SPIDER-MAN EM AÇĂO
</h1>

<div style={{display:"flex",gap:10,marginBottom:10}}>
<button onClick={()=>setTab("home")}>??</button>
<button onClick={()=>setTab("convidados")}>??</button>
<button onClick={()=>setTab("cotacoes")}>??</button>
</div>

{tab==="home" && (
<div className="card">
<div>Total convidados: {convidados.length}</div>
<div>Confirmados: {convidados.filter(c=>c.confirmado).length}</div>
</div>
)}

{tab==="convidados" && (
<div>
<button className="btn" onClick={addGuest}>+ Convidado</button>

{convidados.map(c=>(
<div key={c.id} className="card">

<input placeholder="Nome"
value={c.nome}
onChange={e=>updateGuest(c.id,"nome",e.target.value)}
/>

<input placeholder="WhatsApp"
value={c.telefone}
onChange={e=>updateGuest(c.id,"telefone",e.target.value)}
/>

<div>
<button onClick={()=>updateGuest(c.id,"confirmado",true)}>?</button>
<button onClick={()=>updateGuest(c.id,"confirmado",false)}>?</button>
</div>

</div>
))}
</div>
)}

{tab==="cotacoes" && (
<div>

<button onClick={addCotacao}>+ Cotaçăo</button>

{cotacoes.map(c=>{
const best=getBest(c.opcoes);

return(
<div key={c.id} className="card">

<input value={c.produto}
onChange={e=>{
const lista=[...cotacoes];
lista.find(x=>x.id===c.id).produto=e.target.value;
setCotacoes(lista);
}}
/>

{c.opcoes.map((o,i)=>(
<div key={i} className={best===o?"best":""}>

<input value={o.nome}
onChange={e=>updateCotacao(c.id,i,"nome",e.target.value)}
/>

<input type="number"
value={o.valor}
onChange={e=>updateCotacao(c.id,i,"valor",e.target.value)}
/>

</div>
))}

<div>
?? Melhor opçăo: <b>{best.nome}</b> - R$ {best.valor}
</div>

</div>
)
})}

</div>
)}

</div>
)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
