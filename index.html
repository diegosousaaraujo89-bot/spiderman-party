  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    body{background:#0b1120;font-family:'Nunito',sans-serif;color:#F2F2F2;}
    ::-webkit-scrollbar{width:0;height:0;}
    .hw-card{transition:transform .15s ease,box-shadow .15s ease;}
    .hw-card:active{transform:scale(0.985);}
    .hw-btn:active{transform:scale(0.93);opacity:0.85;}
    .hw-tab{transition:color .2s,border-color .2s;}
    .hw-check{transition:background .2s,border-color .2s;}
    .hw-fade{animation:fadeUp .3s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .hw-slide{animation:slideIn .3s cubic-bezier(.4,0,.2,1) both;}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
    .hw-spin{animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .hw-splash{animation:splashOut .6s ease 2.4s both;}
    @keyframes splashOut{to{opacity:0;pointer-events:none;}}
    .hw-car{animation:carRide 2s ease-in-out both;}
    @keyframes carRide{0%{transform:translateX(-250px) scaleX(1);opacity:0;}65%{transform:translateX(8px) scaleX(1);opacity:1;}80%{transform:translateX(-4px);}100%{transform:translateX(0);opacity:1;}}
    .hw-title-in{animation:titlePop .5s cubic-bezier(.34,1.56,.64,1) .7s both;}
    @keyframes titlePop{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
    .hw-progress{transition:width .5s cubic-bezier(.4,0,.2,1);}
    @keyframes dot{to{opacity:1;}}
    input[type=number]::-webkit-inner-spin-button{opacity:1;}
    .hw-splash .hw-car{font-size:0!important;line-height:0;}

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* -- API (servidor Render) -- */
    const API = window.location.origin;

    async function apiGet(path) {
      try { const r = await fetch(API+path); return r.ok ? r.json() : null; } catch { return null; }
    }
    async function apiPost(path, body) {
      try { const r = await fetch(API+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); return r.ok ? r.json() : null; } catch { return null; }
    }
    async function apiPut(path, body) {
      try { const r = await fetch(API+path,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); return r.ok ? r.json() : null; } catch { return null; }
    }
    async function apiDel(path) {
      try { const r = await fetch(API+path,{method:"DELETE"}); return r.ok ? r.json() : null; } catch { return null; }

    function EditField({ value, onSave, type="text", style={} }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(value);
      const ref = useRef();
      useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);
      const commit = () => { onSave(type==="number"?parseFloat(val)||0:val); setEditing(false); };
      if (editing) return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}>
          <input ref={ref} type={type} value={val}
            onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter")commit(); if(e.key==="Escape")setEditing(false); }}
            style={{ background:C.card2, border:`1.5px solid ${C.yellow}`, borderRadius:6, padding:"4px 8px", color:C.text, fontFamily:"'Nunito',sans-serif", fontSize:13, outline:"none", width:type==="number"?64:160 }}
          />
          <button onClick={commit} style={{ background:C.success+"22",color:C.success,border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",fontSize:13 }}>✓</button>
          <button onClick={()=>setEditing(false)} style={{ background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13 }}>✕</button>
        </span>
      );
      return (
        <span onClick={()=>{ setVal(value); setEditing(true); }}
          style={{ display:"inline-flex", alignItems:"center", gap:5, cursor:"text", ...style }}>
          {value}<span style={{ fontSize:10, opacity:.35 }}>✏️</span>
        </span>
      );
    }

          const melhor = servico.opcoes[0]; // already sorted, index 0 = cheapest

                    <span style={{ color:C.success, fontWeight:900, fontFamily:"'Bebas Neue',cursive", fontSize:20 }}>{checkDone}/{data.checklist.length}</span>
                  </div>
                  <div style={{ background:C.card2, borderRadius:8, height:10, overflow:"hidden" }}>
                    <div className="hw-progress" style={{ height:"100%", width:`${checkPct}%`, background:`linear-gradient(90deg,${C.success},#4ADE80)`, borderRadius:8 }} />
                  </div>
                  <div style={{ fontSize:11, color:C.muted, marginTop:6 }}>{checkPct}% concluído</div>
                </div>
                {cats.map(cat=>{
                  const items = data.checklist.filter(c=>c.categoria===cat);
                  if (!items.length) return null;
                  const cd = items.filter(c=>c.done).length;
                  return (
                    <div key={cat} style={{ marginBottom:4 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                        <span style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, fontWeight:700 }}>{cat}</span>
                        <span style={{ fontSize:10, color:cd===items.length?C.success:C.muted, fontWeight:700 }}>{cd}/{items.length}</span>
                      </div>
                      <div style={cardSt}>
                        {items.map((c,i)=>(
                          <div key={c.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 0", borderBottom:i<items.length-1?`1px solid ${C.border}`:"none" }}>
                            <div className="hw-check" style={{ width:24, height:24, borderRadius:7, border:`2px solid ${c.done?C.success:C.border}`, background:c.done?C.success:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:14, cursor:"pointer", boxShadow:c.done?`0 0 10px ${C.success}55`:"none" }} onClick={()=>toggleCheck(c.id)}>
                              {c.done&&"✓"}
                            </div>
                            <div style={{ flex:1, minWidth:0 }}>
                              <EditField value={c.item} onSave={v=>editCheck(c.id,v)}
                                style={{ fontSize:14, fontWeight:600, opacity:c.done?.4:1, textDecoration:c.done?"line-through":"none" }} />
                            </div>
                            <button className="hw-btn" onClick={()=>removeCheck(c.id)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:15, flexShrink:0, padding:"0 4px" }}>🗑️</button>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
                {!addingCheck ? (
                  <button className="hw-btn" style={btnP} onClick={()=>setAddingCheck(true)}>+ Nova Tarefa</button>
                ) : (
                  <div className="hw-fade" style={{ ...cardSt, borderLeft:`4px solid ${C.yellow}` }}>
                    <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:16, color:C.yellow, marginBottom:12, letterSpacing:1 }}>NOVA TAREFA</div>
                    <input style={{ ...inpSt, marginBottom:8 }} placeholder="Descrição da tarefa" value={newCheck.item} onChange={e=>setNewCheck({...newCheck,item:e.target.value})} />
                    <select style={{ ...inpSt, marginBottom:12 }} value={newCheck.categoria} onChange={e=>setNewCheck({...newCheck,categoria:e.target.value})}>
                      {cats.map(c=><option key={c}>{c}</option>)}
                    </select>
                    <div style={{ display:"flex", gap:8 }}>
                      <button className="hw-btn" style={{ ...btnP, marginTop:0 }} onClick={()=>{ if(newCheck.item.trim()){ addCheck(newCheck.item.trim(), newCheck.categoria); setNewCheck({item:"",categoria:"Buffet"}); setAddingCheck(false); } }}>Salvar</button>
                      <button className="hw-btn" style={{ ...btnP, marginTop:0, background:C.card2, boxShadow:"none" }} onClick={()=>setAddingCheck(false)}>Cancelar</button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {tab==="budget" && (
              <div>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:18, letterSpacing:2, color:C.yellow, marginBottom:12 }}>💰 Orçamento</div>
                <div className="hw-card" style={{ ...cardSt, background:`linear-gradient(135deg,${C.redD},#060d1a)`, border:`1px solid ${C.red}44`, marginBottom:16 }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <div>
                      <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:1, fontWeight:700 }}>Total estimado</div>
                      <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:32, color:C.yellow, lineHeight:1 }}>R$ {totalOrc.toLocaleString("pt-BR")}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:10, color:C.muted, textTransform:"uppercase", letterSpacing:1, fontWeight:700 }}>Falta pagar</div>
                      <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:32, color:C.danger, lineHeight:1 }}>R$ {falta.toLocaleString("pt-BR")}</div>
                    </div>
                  </div>
                  <div style={{ background:"rgba(0,0,0,.4)", borderRadius:8, height:10, overflow:"hidden", margin:"12px 0 6px" }}>
                    <div className="hw-progress" style={{ height:"100%", width:`${pagoPct}%`, background:`linear-gradient(90deg,${C.success},#4ADE80)`, borderRadius:8 }} />
                  </div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,.4)" }}>R$ {pago.toLocaleString("pt-BR")} pago ({pagoPct}%)</div>
                </div>
                <div style={cardSt}>
                  {data.orcamento.map((o,i)=>(
                    <div key={o.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 0", borderBottom:i<data.orcamento.length-1?`1px solid ${C.border}`:"none" }}>
                      <div style={{ width:36, height:36, borderRadius:10, background:o.pago?C.success+"22":C.yellow+"18", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>
                        {o.pago?"✅":"💵"}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <EditField value={o.item} onSave={v=>editOrc(o.id,"item",v)} style={{ fontWeight:700, fontSize:13, opacity:o.pago?.5:1 }} />
                        <div style={{ display:"flex", alignItems:"center", gap:3, marginTop:2 }}>
                          <span style={{ color:C.muted, fontSize:11 }}>R$</span>
                          <EditField value={o.valor} type="number" onSave={v=>editOrc(o.id,"valor",v)}
                            style={{ fontFamily:"'Bebas Neue',cursive", fontSize:20, color:o.pago?C.success:C.yellow, lineHeight:1 }} />
                        </div>
                        {(()=>{ const srv = Object.keys(COT_ORC_MAP).find(k=>COT_ORC_MAP[k]===o.id); if(!srv) return null; const s = data.cotacoes.find(c=>c.servico===srv); if(!s) return null; const escolhido = s.opcoes.find(op=>op.escolhido); const melhor = [...s.opcoes].sort((a,b)=>a.valor-b.valor)[0]; return (<div style={{ fontSize:10, color:escolhido?C.success:C.spiderBlue, marginTop:2, fontWeight:700 }}>{escolhido ? "✓ "+escolhido.fornecedor : "💡 Menor: "+melhor.fornecedor}</div>); })()}
                      </div>
                      <button className="hw-btn" onClick={()=>togglePago(o.id)} style={btnSm(o.pago?C.success:C.muted)}>
                        {o.pago?"Pago ✅":"Pagar"}
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab==="cotacoes" && (
              <div>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:18, letterSpacing:2, color:C.spiderBlue, marginBottom:4 }}>📋 Cotacoes</div>
                <div style={{ fontSize:12, color:C.muted, marginBottom:16 }}>Toque em qualquer campo para editar • Selecione o melhor fornecedor</div>
                {data.cotacoes.map(s=>{
                  const escolhido = s.opcoes.find(o=>o.escolhido);
                  const menorVal = Math.min(...s.opcoes.map(o=>o.valor));
                  return (
                    <div key={s.servico} style={{ marginBottom:20 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <EditField value={s.servico} onSave={v=>editServico(s.servico,v)} style={{ fontFamily:"'Bebas Neue',cursive", fontSize:16, letterSpacing:2, color:C.spiderBlue }} />
                        </div>
                        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                          {escolhido && <span style={{ background:C.success+"22", color:C.success, borderRadius:20, padding:"2px 8px", fontSize:10, fontWeight:700 }}>✓ {escolhido.fornecedor}</span>}
                          <button className="hw-btn" onClick={()=>removeServico(s.servico)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:14 }}>🗑️</button>
                        </div>
                      </div>
                      {s.opcoes.map((o,idx)=>{
                        const isBest = o.valor===menorVal;
                        return (
                          <div key={o.id} className="hw-card" style={{ ...cardSt, marginBottom:10, border:`1.5px solid ${o.escolhido?C.success:isBest?C.spiderBlue+"66":C.border}`, background:o.escolhido?C.success+"0D":C.card }}>
                            <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                              <div style={{ width:32, height:32, borderRadius:10, background:"rgba(255,255,255,.06)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>
                                {idx===0?"🥇":idx===1?"🥈":"🥉"}
                              </div>
                              <div style={{ flex:1, minWidth:0 }}>
                                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                                  <EditField value={o.fornecedor} onSave={v=>editCotacao(s.servico,o.id,"fornecedor",v)} style={{ fontWeight:700, fontSize:13 }} />
                                  <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                                    {isBest && !o.escolhido && <span style={{ background:C.spiderBlue+"22", color:C.spiderBlue, fontSize:9, fontWeight:700, borderRadius:20, padding:"2px 7px" }}>+ barato</span>}
                                    {o.escolhido && <span style={{ background:C.success+"22", color:C.success, fontSize:9, fontWeight:700, borderRadius:20, padding:"2px 7px" }}>✓</span>}
                                    <button className="hw-btn" onClick={()=>removeOpcao(s.servico,o.id)} style={{ background:"none", border:"none", cursor:"pointer", color:C.muted, fontSize:13, padding:"0 2px" }}>🗑️</button>
                                  </div>
                                </div>
                                <div style={{ display:"flex", alignItems:"center", gap:4, marginBottom:3 }}>
                                  <span style={{ color:C.muted, fontSize:11 }}>📱</span>
                                  <EditField value={o.contato} onSave={v=>editCotacao(s.servico,o.id,"contato",v)} style={{ color:C.spiderBlue, fontSize:11, fontWeight:600 }} />
                                </div>
                                <div style={{ display:"flex", alignItems:"center", gap:3, marginBottom:3 }}>
                                  <span style={{ color:C.muted, fontSize:11 }}>R$</span>
                                  <EditField value={o.valor} type="number" onSave={v=>editCotacao(s.servico,o.id,"valor",v)} style={{ fontFamily:"'Bebas Neue',cursive", fontSize:22, color:o.escolhido?C.success:isBest?C.spiderBlue:C.text, lineHeight:1 }} />
                                </div>
                                <EditField value={o.obs} onSave={v=>editCotacao(s.servico,o.id,"obs",v)} style={{ color:C.muted, fontSize:11 }} />
                              </div>
                            </div>
                            <button className="hw-btn" onClick={()=>toggleEscolhido(s.servico,o.id)}
                              style={{ ...btnSm(o.escolhido?C.success:C.muted), width:"100%", marginTop:10, padding:"8px", textAlign:"center" }}>
                              {o.escolhido?"✅ Selecionado — toque para desmarcar":"Selecionar este fornecedor"}
                            </button>
                          </div>
                        );
                      })}
                      <button className="hw-btn" onClick={()=>addOpcao(s.servico)} style={{ ...btnSm(C.spiderBlue), width:"100%", padding:"9px", textAlign:"center", marginBottom:4 }}>
                        + Adicionar fornecedor
                      </button>
                    </div>
                  );
                })}
                <button className="hw-btn" style={btnP} onClick={()=>addServico()}>+ Novo Serviço</button>
              </div>
            )}
          </div>

          <BottomNav tab={tab} setTab={setTab} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Service Worker para PWA offline
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
