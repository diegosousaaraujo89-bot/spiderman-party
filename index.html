<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Festa do Arthur 🕷️</title>

  <!-- PWA -->
  <meta name="theme-color" content="#CC0000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Festa Arthur" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
    body{background:#080808;font-family:'Nunito',sans-serif;color:#F2F2F2;}
    ::-webkit-scrollbar{width:0;height:0;}
    .hw-card{transition:transform .15s ease,box-shadow .15s ease;}
    .hw-card:active{transform:scale(0.985);}
    .hw-btn:active{transform:scale(0.93);opacity:0.85;}
    .hw-tab{transition:color .2s,border-color .2s;}
    .hw-check{transition:background .2s,border-color .2s;}
    .hw-fade{animation:fadeUp .3s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .hw-slide{animation:slideIn .3s cubic-bezier(.4,0,.2,1) both;}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
    .hw-spin{animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .hw-splash{animation:splashOut .6s ease 2.4s both;}
    @keyframes splashOut{to{opacity:0;pointer-events:none;}}
    .hw-car{animation:carRide 2s ease-in-out both;}
    @keyframes carRide{0%{transform:translateY(-80px) scale(0.5);opacity:0;}70%{transform:translateY(0) scale(1.1);opacity:1;}100%{transform:translateY(0) scale(1);opacity:1;}}
    .hw-title-in{animation:titlePop .5s cubic-bezier(.34,1.56,.64,1) .7s both;}
    @keyframes titlePop{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
    .hw-progress{transition:width .5s cubic-bezier(.4,0,.2,1);}
    @keyframes dot{to{opacity:1;}}
    input[type=number]::-webkit-inner-spin-button{opacity:1;}
  </style>
</head>
<body>

    const C = {
      red:"#CC0000",redD:"#800000",yellow:"#1A73E8",black:"#080808",dark:"#101010",
      surface:"#0D1117",card:"#161B22",card2:"#21262D",text:"#F2F2F2",muted:"#666",
      success:"#22C55E",danger:"#EF4444",blue:"#1A73E8",purple:"#8B5CF6",border:"#2C3444",
      spiderBlue:"#1A73E8",spiderRed:"#CC0000",
    };

    function EditField({ value, onSave, type="text", style={} }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(value);
      const ref = useRef();
      useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);
      const commit = () => { onSave(type==="number"?parseFloat(val)||0:val); setEditing(false); };
      if (editing) return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}>
          <input ref={ref} type={type} value={val}
            onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter")commit(); if(e.key==="Escape")setEditing(false); }}
            style={{ background:C.card2, border:`1.5px solid ${C.yellow}`, borderRadius:6, padding:"4px 8px", color:C.text, fontFamily:"'Nunito',sans-serif", fontSize:13, outline:"none", width:type==="number"?64:160 }}
          />
          <button onClick={commit} style={{ background:C.success+"22",color:C.success,border:"none",borderRadius:6,padding:"4px 7px",cursor:"pointer",fontSize:13 }}>✓</button>
          <button onClick={()=>setEditing(false)} style={{ background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13 }}>✕</button>
        </span>
      );
      return (
        <span onClick={()=>{ setVal(value); setEditing(true); }}
          style={{ display:"inline-flex", alignItems:"center", gap:5, cursor:"text", ...style }}>
          {value}<span style={{ fontSize:10, opacity:.35 }}>✏️</span>
        </span>
      );
    }

    function Splash({ onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2900); return ()=>clearTimeout(t); }, []);
      return (
        <div className="hw-splash" style={{ position:"fixed", inset:0, zIndex:999, background:`linear-gradient(170deg,#800000,#CC0000 40%,#0a1628 80%)`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
          <div style={{ height:6, background:`repeating-linear-gradient(90deg,${C.spiderBlue} 0,${C.spiderBlue} 20px,transparent 20px,transparent 40px)`, width:"100%", position:"absolute", top:0 }} />
          <div style={{ height:6, background:`repeating-linear-gradient(90deg,${C.spiderBlue} 0,${C.spiderBlue} 20px,transparent 20px,transparent 40px)`, width:"100%", position:"absolute", bottom:0 }} />
          <div className="hw-car" style={{ fontSize:80, marginBottom:8 }}>🕷️</div>
          <div className="hw-title-in" style={{ fontFamily:"'Bebas Neue',cursive", fontSize:44, color:"#fff", letterSpacing:3, lineHeight:1, textShadow:`3px 3px 0 #800000`, textAlign:"center" }}>HOMEM ARANHA</div>
          <div className="hw-title-in" style={{ fontFamily:"'Bebas Neue',cursive", fontSize:22, color:C.spiderBlue, letterSpacing:6, animationDelay:".85s" }}>EM AÇÃO</div>
          <div className="hw-title-in" style={{ marginTop:16, fontSize:13, color:"rgba(255,255,255,.5)", fontWeight:700, animationDelay:"1.1s" }}>Festa do Arthur • 09/01/2027</div>
        </div>
      );
    }

    const TABS = [
      { id:"home", icon:"🏠", label:"Início" },
      { id:"guests", icon:"👥", label:"Convidados" },
      { id:"check", icon:"✅", label:"Tarefas" },
      { id:"budget", icon:"💰", label:"Gastos" },
      { id:"cotacoes", icon:"📋", label:"Cotações" },
    ];

    function BottomNav({ tab, setTab }) {
      return (
        <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:C.surface, borderTop:`1px solid ${C.border}`, display:"flex", zIndex:100, paddingBottom:"env(safe-area-inset-bottom,0px)", boxShadow:`0 -8px 32px rgba(0,0,0,.7)` }}>
          {TABS.map(t => {
            const active = tab===t.id;
            return (
              <button key={t.id} className="hw-tab" onClick={()=>setTab(t.id)}
                style={{ flex:1, background:"none", border:"none", padding:"10px 4px 8px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, color:active?C.yellow:C.muted, fontFamily:"'Nunito',sans-serif", fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:.5, borderTop:active?`2px solid ${C.yellow}`:"2px solid transparent", marginTop:-1 }}>
                <span style={{ fontSize:22, filter:active?`drop-shadow(0 0 6px rgba(255,215,0,.6))`:"none", transition:"filter .2s" }}>{t.icon}</span>
                {t.label}
              </button>
            );
          })}
        </div>
      );
    }

    function StatCard({ icon, value, label, color }) {
      return (
        <div className="hw-card" style={{ background:C.card, borderRadius:14, padding:"14px 12px", borderBottom:`3px solid ${color}`, boxShadow:`0 4px 20px rgba(0,0,0,.4),0 0 0 1px ${C.border}` }}>

          <div style={{ fontSize:10, color:C.muted, fontWeight:700, marginTop:2 }}>{label}</div>
        </div>
      );
    }

    function App() {
      const [splash, setSplash] = useState(true);
      const [tab, setTab] = useState("home");
      const [data, setData] = useState(() => loadData() || DD);
      const [addGuest, setAddGuest] = useState(false);
      const [newGuest, setNewGuest] = useState({ nome:"", grupo:"Família", adultos:2, criancas:1 });
      const [filterGroup, setFilterGroup] = useState("Todos");
      const [searchQ, setSearchQ] = useState("");
      const [convidadoModal, setConvidadoModal] = useState(null);
      const [toastMsg, setToastMsg] = useState(null);

      const persist = useCallback((nd) => { setData(nd); saveData(nd); }, []);

      const conf = data.convidados.filter(g=>g.confirmado===true);
      const pend = data.convidados.filter(g=>g.confirmado===null);
      const recus = data.convidados.filter(g=>g.confirmado===false);
      const totalPessoas = conf.reduce((a,g)=>a+g.adultos+g.criancas,0);
      const checkDone = data.checklist.filter(c=>c.done).length;
      const totalOrc = data.orcamento.reduce((a,o)=>a+o.valor,0);
      const pago = data.orcamento.filter(o=>o.pago).reduce((a,o)=>a+o.valor,0);
      const falta = totalOrc - pago;
      const checkPct = Math.round((checkDone/data.checklist.length)*100);
      const pagoPct = totalOrc>0?Math.round((pago/totalOrc)*100):0;

      const toggleCheck = id => persist({...data, checklist:data.checklist.map(c=>c.id===id?{...c,done:!c.done}:c)});
      const toggleConfirm = (id,val) => persist({...data, convidados:data.convidados.map(g=>g.id===id?{...g,confirmado:g.confirmado===val?null:val}:g)});
      const togglePago = id => persist({...data, orcamento:data.orcamento.map(o=>o.id===id?{...o,pago:!o.pago}:o)});
      const removeGuest = id => persist({...data, convidados:data.convidados.filter(g=>g.id!==id)});
      const editGuest = (id,f,v) => persist({...data, convidados:data.convidados.map(g=>g.id===id?{...g,[f]:v}:g)});
      const editCheck = (id,v) => persist({...data, checklist:data.checklist.map(c=>c.id===id?{...c,item:v}:c)});
      const editOrc = (id,f,v) => persist({...data, orcamento:data.orcamento.map(o=>o.id===id?{...o,[f]:v}:o)});
      const toggleEscolhido = (servico, opcaoId) => persist({...data, cotacoes:data.cotacoes.map(s=>s.servico===servico?{...s,opcoes:s.opcoes.map(o=>({...o,escolhido:o.id===opcaoId?!o.escolhido:false}))}:s)});
      const editCotacao = (servico, opcaoId, field, val) => persist({...data, cotacoes:data.cotacoes.map(s=>s.servico===servico?{...s,opcoes:s.opcoes.map(o=>o.id===opcaoId?{...o,[field]:field==="valor"?parseFloat(val)||0:val}:o)}:s)});
      const showToast = (msg) => { setToastMsg(msg); setTimeout(()=>setToastMsg(null), 3000); };

      const sendInviteWhatsApp = (g) => {
        const texto = encodeURIComponent(
          `🕷️ *Homem Aranha em Ação!* 🕷️\n\n` +
          `Olá, *${g.nome}*! 🎉\n` +
          `Você está convidado(a) para a festa de aniversário do *Arthur*!\n\n` +
          `📅 *Data:* 09 de Janeiro de 2027\n` +
          `🎂 *Tema:* Homem Aranha em Ação\n\n` +
          `Para *CONFIRMAR* sua presença, responda com:\n` +
          `✅ *SIM* — vou comparecer\n` +
          `❌ *NÃO* — não poderei ir\n\n` +
          `_Aguardamos sua confirmação! 🕸️_`
        );
        const phone = (g.telefone||"").replace(/\D/g,"");
        const url = phone
          ? \`https://wa.me/55\${phone}?text=\${texto}\`
          : \`https://wa.me/?text=\${texto}\`;
        window.open(url, "_blank");
        persist({...data, convidados:data.convidados.map(c=>c.id===g.id?{...c,conviteEnviado:true}:c)});
        showToast(\`Convite aberto para \${g.nome}! 📨\`);
        setConvidadoModal(null);
      };

      const sendInviteSMS = (g) => {
        const texto = encodeURIComponent(
          \`🕷️ Festa do Arthur - Homem Aranha em Ação! \n\` +
          \`Olá \${g.nome}! Você está convidado(a) para 09/01/2027. \n\` +
          \`Confirme sua presença respondendo SIM ou NÃO.\`
        );
        const phone = (g.telefone||"").replace(/\D/g,"");
        const url = phone ? \`sms:\${phone}?body=\${texto}\` : \`sms:?body=\${texto}\`;
        window.open(url, "_blank");
        persist({...data, convidados:data.convidados.map(c=>c.id===g.id?{...c,conviteEnviado:true}:c)});
        showToast(\`SMS aberto para \${g.nome}! 📩\`);
        setConvidadoModal(null);
      };

      const confirmFromInvite = (g) => {
        persist({...data, convidados:data.convidados.map(c=>c.id===g.id?{...c,confirmado:true,conviteEnviado:true}:c)});
        showToast(\`✅ \${g.nome} confirmado(a)!\`);
        setConvidadoModal(null);
      };

      const recusarFromInvite = (g) => {
        persist({...data, convidados:data.convidados.map(c=>c.id===g.id?{...c,confirmado:false}:c)});
        showToast(\`❌ \${g.nome} marcado(a) como recusou.\`);
        setConvidadoModal(null);
      };

      const addGuestFn = () => {
        if (!newGuest.nome.trim()) return;
        persist({...data, convidados:[...data.convidados,{...newGuest,id:Date.now(),confirmado:null,adultos:+newGuest.adultos,criancas:+newGuest.criancas}]});
        setNewGuest({nome:"",grupo:"Família",adultos:2,criancas:1}); setAddGuest(false);
      };

      const groups = ["Todos","Família","Escola","Amigos"];
      const filtered = data.convidados.filter(g=>(filterGroup==="Todos"||g.grupo===filterGroup)&&g.nome.toLowerCase().includes(searchQ.toLowerCase()));
      const cats = ["Buffet","Alimentação","Decoração","Convites","Entretenimento","Lembranças","Registro","Aniversariante"];
      const gc = g=>g==="Família"?C.red:g==="Escola"?C.blue:C.purple;

      const cardSt = { background:C.card, borderRadius:16, padding:16, marginBottom:12, boxShadow:`0 4px 24px rgba(0,0,0,.5),0 0 0 1px ${C.border}` };
      const inpSt = { background:C.card2, border:`1px solid ${C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontFamily:"'Nunito',sans-serif", fontSize:14, outline:"none", width:"100%" };
      const btnP = { background:`linear-gradient(135deg,${C.red},${C.redD})`, color:"#fff", border:"none", borderRadius:12, padding:14, fontFamily:"'Nunito',sans-serif", fontWeight:900, fontSize:15, cursor:"pointer", width:"100%", marginTop:8, boxShadow:`0 4px 16px rgba(200,0,0,.4)` };

                        {escolhido && <span style={{ background:C.success+"22", color:C.success, borderRadius:20, padding:"2px 10px", fontSize:10, fontWeight:700 }}>✓ {escolhido.fornecedor}</span>}
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                        {s.opcoes.map((o,idx)=>{
                          const isBest = o.valor===menorVal;
                          const borderColor = o.escolhido ? C.success : isBest ? C.spiderBlue+"88" : C.border;
                          return (
                            <div key={o.id} className="hw-card" style={{ ...cardSt, marginBottom:0, border:`1.5px solid ${borderColor}`, background:o.escolhido?C.success+"11":C.card, position:"relative" }}>
                              {isBest && !o.escolhido && <span style={{ position:"absolute", top:10, right:10, background:C.spiderBlue+"22", color:C.spiderBlue, fontSize:9, fontWeight:700, borderRadius:20, padding:"2px 8px" }}>💙 MENOR PREÇO</span>}
                              {o.escolhido && <span style={{ position:"absolute", top:10, right:10, background:C.success+"22", color:C.success, fontSize:9, fontWeight:700, borderRadius:20, padding:"2px 8px" }}>✅ ESCOLHIDO</span>}
                              <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                                <div style={{ width:32, height:32, borderRadius:10, background:o.escolhido?C.success+"33":"rgba(255,255,255,.05)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>
                                  {idx===0?"🥇":idx===1?"🥈":"🥉"}
                                </div>
                                <div style={{ flex:1, minWidth:0 }}>
                                  <EditField value={o.fornecedor} onSave={v=>editCotacao(s.servico,o.id,"fornecedor",v)} style={{ fontWeight:700, fontSize:13, color:C.text }} />
                                  <div style={{ display:"flex", alignItems:"center", gap:4, marginTop:3 }}>
                                    <span style={{ color:C.muted, fontSize:11 }}>📱</span>
                                    <EditField value={o.contato} onSave={v=>editCotacao(s.servico,o.id,"contato",v)} style={{ color:C.spiderBlue, fontSize:11, fontWeight:600 }} />
                                  </div>
                                  <div style={{ display:"flex", alignItems:"center", gap:3, marginTop:2 }}>
                                    <span style={{ color:C.muted, fontSize:11 }}>R$</span>
                                    <EditField value={o.valor} type="number" onSave={v=>editCotacao(s.servico,o.id,"valor",v)} style={{ fontFamily:"'Bebas Neue',cursive", fontSize:22, color:o.escolhido?C.success:isBest?C.spiderBlue:C.text, lineHeight:1 }} />
                                  </div>
                                  <div style={{ color:C.muted, fontSize:11, marginTop:3 }}>
                                    <EditField value={o.obs} onSave={v=>editCotacao(s.servico,o.id,"obs",v)} style={{ color:C.muted, fontSize:11 }} />
                                  </div>
                                </div>
                              </div>
                              <button className="hw-btn" onClick={()=>toggleEscolhido(s.servico,o.id)}
                                style={{ ...btnSm(o.escolhido?C.success:C.muted), width:"100%", marginTop:10, padding:"8px", textAlign:"center" }}>
                                {o.escolhido?"✅ Selecionado — Clique para desmarcar":"Selecionar esta opção"}
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <BottomNav tab={tab} setTab={setTab} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // Service Worker para PWA offline
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
