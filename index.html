<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> Arthur 6 Anos - Homem Aranha em Açăo </title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{margin:0;background:#020617;color:#fff;font-family:'Nunito'}
.card{background:#111827;padding:14px;border-radius:12px;margin-bottom:10px}
.btn{padding:8px 10px;border-radius:8px;border:none;font-weight:700;cursor:pointer}
.red{background:#E11D48;color:#fff}
.blue{background:#1D4ED8;color:#fff}
.green{background:#22C55E;color:#fff}
.best{background:#22C55E33;border:1px solid #22C55E}
.tab{padding:10px;cursor:pointer}
.active{color:#22C55E}
.header{font-family:'Bebas Neue';font-size:32px;color:#E11D48}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState}=React;

function getBest(opcoes){
  return opcoes.reduce((min,c)=> c.valor<min.valor?c:min,opcoes[0]);
}

function App(){

const [tab,setTab]=useState("home");

const [convidados,setConvidados]=useState([
{id:1,nome:"Vovó Maria",telefone:"11999999999",confirmado:null},
]);

const [cotacoes,setCotacoes]=useState([
{
id:1,
produto:"Buffet",
opcoes:[
{nome:"Fornecedor A",valor:8000},
{nome:"Fornecedor B",valor:7200},
{nome:"Fornecedor C",valor:8500}
]
}
]);

// ---------- CONVIDADOS ----------
const addConvidado=()=>{
setConvidados([...convidados,{id:Date.now(),nome:"",telefone:"",confirmado:null}]);
};

const updateConvidado=(id,field,value)=>{
setConvidados(convidados.map(c=>c.id===id?{...c,[field]:value}:c));
};

// ---------- COTAÇŐES ----------
const addCotacao=()=>{
setCotacoes([...cotacoes,{
id:Date.now(),
produto:"Novo Serviço",
opcoes:[
{nome:"Opçăo 1",valor:0},
{nome:"Opçăo 2",valor:0},
{nome:"Opçăo 3",valor:0}
]
}]);
};

const updateCotacao=(id,index,field,value)=>{
setCotacoes(cotacoes.map(c=>{
if(c.id!==id) return c;
const nova=[...c.opcoes];
nova[index][field]=field==="valor"?Number(value):value;
return {...c,opcoes:nova};
}));
};

// ---------- DASHBOARD ----------
const totalConvidados=convidados.length;
const confirmados=convidados.filter(c=>c.confirmado===true).length;

return(
<div style={{padding:20,maxWidth:500,margin:"auto"}}>

<div className="header">??? SPIDER-MAN EM AÇĂO</div>

<div style={{display:"flex",gap:10,marginBottom:10}}>
<div className={tab==="home"?"active tab":"tab"} onClick={()=>setTab("home")}>??</div>
<div className={tab==="convidados"?"active tab":"tab"} onClick={()=>setTab("convidados")}>??</div>
<div className={tab==="cotacoes"?"active tab":"tab"} onClick={()=>setTab("cotacoes")}>??</div>
</div>

{/* HOME */}
{tab==="home" && (
<div className="card">
<div>Total convidados: {totalConvidados}</div>
<div>Confirmados: {confirmados}</div>
</div>
)}

{/* CONVIDADOS */}
{tab==="convidados" && (
<div>
<button className="btn blue" onClick={addConvidado}>+ Convidado</button>

{convidados.map(c=>(
<div key={c.id} className="card">

<input placeholder="Nome"
value={c.nome}
onChange={e=>updateConvidado(c.id,"nome",e.target.value)}
/>

<input placeholder="Telefone"
value={c.telefone}
onChange={e=>updateConvidado(c.id,"telefone",e.target.value)}
/>

<div style={{marginTop:8}}>
<button className="btn green" onClick={()=>updateConvidado(c.id,"confirmado",true)}>?</button>
<button className="btn red" onClick={()=>updateConvidado(c.id,"confirmado",false)}>?</button>
</div>

</div>
))}
</div>
)}

{/* COTAÇŐES */}
{tab==="cotacoes" && (
<div>
<button className="btn blue" onClick={addCotacao}>+ Cotaçăo</button>

{cotacoes.map(c=>{
const best=getBest(c.opcoes);

return(
<div key={c.id} className="card">

<input value={c.produto}
onChange={e=>{
const lista=[...cotacoes];
lista.find(x=>x.id===c.id).produto=e.target.value;
setCotacoes(lista);
}}
/>

{c.opcoes.map((o,i)=>(
<div key={i} className={best===o?"best":""} style={{marginTop:6}}>

<input value={o.nome}
onChange={e=>updateCotacao(c.id,i,"nome",e.target.value)}
/>

<input type="number"
value={o.valor}
onChange={e=>updateCotacao(c.id,i,"valor",e.target.value)}
/>

</div>
))}

<div style={{marginTop:10}}>
?? Melhor opçăo: <b>{best.nome}</b> - R$ {best.valor}
</div>

</div>
)
})}
</div>
)}

</div>
)
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
